[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra"

[tool.coverage.run]
branch = true
source = ["dq", "scripts", "tools"]
omit = [
  "*/__init__.py",
  "reports/*",
  "data/*",
  ".venv/*"
]

[tool.coverage.report]
show_missing = true
skip_empty = true
precision = 2
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "raise SystemExit"
]

[tool.coverage.xml]
output = "reports/latest/coverage.xml"

[tool.coverage.html]
directory = "reports/latest/htmlcov"
